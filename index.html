<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuSense</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 20px; background: linear-gradient(90deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 12px; color: #555; }
        .upload-bar { padding: 12px 24px; background: #141414; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .upload-bar input[type="file"] { display: none; }
        .upload-label { font-size: 13px; color: #6366f1; cursor: pointer; border: 1px solid #6366f1; padding: 6px 14px; border-radius: 6px; transition: .2s; white-space: nowrap; }
        .upload-label:hover { background: #6366f1; color: white; }
        .file-status { font-size: 12px; color: #666; flex: 1; }
        .file-status.success { color: #4ade80; }
        .file-status.loading { color: #818cf8; }
        .btn-upload { font-size: 12px; background: #6366f1; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-clear { font-size: 12px; background: transparent; color: #666; border: 1px solid #333; padding: 6px 14px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .btn-clear:hover { border-color: #f87171; color: #f87171; }
        .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 80%; }
        .message.human { align-self: flex-end; }
        .message.ai { align-self: flex-start; }
        .message-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
        .human .message-bubble { background: #6366f1; color: white; border-radius: 12px 12px 2px 12px; }
        .ai .message-bubble { background: #1a1a1a; color: #ccc; border: 1px solid #2a2a2a; border-radius: 12px 12px 12px 2px; white-space: pre-wrap; }
        .sources-toggle { font-size: 11px; color: #555; cursor: pointer; margin-top: 6px; padding-left: 4px; }
        .sources-toggle:hover { color: #6366f1; }
        .sources-list { margin-top: 6px; display: none; }
        .sources-list.open { display: block; }
        .source-item { background: #111; border-left: 2px solid #6366f1; padding: 6px 10px; margin-bottom: 4px; font-size: 11px; color: #666; border-radius: 0 4px 4px 0; line-height: 1.5; }
        .source-file { color: #6366f1; font-weight: 600; }
        .thinking { align-self: flex-start; font-size: 13px; color: #555; padding: 8px 0; }
        .thinking span { animation: blink 1.2s infinite; }
        .thinking span:nth-child(2) { animation-delay: .2s; }
        .thinking span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
        .input-area { padding: 16px 24px; border-top: 1px solid #1e1e1e; display: flex; gap: 10px; }
        .input-area textarea { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; resize: none; outline: none; font-family: inherit; max-height: 120px; }
        .input-area textarea:focus { border-color: #6366f1; }
        .btn-send { background: #6366f1; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 18px; transition: opacity .2s; }
        .btn-send:hover { opacity: 0.85; }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; text-align: center; }
        .empty-state h2 { font-size: 18px; margin-bottom: 8px; }
        .empty-state p { font-size: 13px; }
        .file-tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 24px; background: #0f0f0f; border-bottom: 1px solid #1e1e1e; display: none; }
        .file-tag { font-size: 11px; background: #1a1a2e; color: #6366f1; border: 1px solid #2a2a4e; padding: 3px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>DocuSense</h1>
        <p>Research Paper Assistant</p>
    </div>

    <div class="upload-bar">
        <label class="upload-label" for="fileInput">Choose PDFs</label>
        <input type="file" id="fileInput" accept=".pdf" multiple onchange="handleFile(this)">
        <span class="file-status" id="fileStatus">No files selected</span>
        <button class="btn-upload" id="uploadBtn" onclick="uploadPaper()" disabled>Upload</button>
        <button class="btn-clear" onclick="clearChat()">Clear chat</button>
    </div>

    <div class="file-tags" id="fileTags"></div>

    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            <h2>Upload papers to get started</h2>
            <p>Select one or multiple PDFs, then ask anything about them</p>
        </div>
    </div>

    <div class="input-area">
        <textarea id="question" placeholder="Ask a question... (Enter to send, Shift+Enter for new line)" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="askQuestion()">↑</button>
    </div>

    <script>
        let selectedFiles = null;
        let sessionId = 'session_' + Date.now();

        function handleFile(input) {
            selectedFiles = input.files;
            if (selectedFiles.length > 0) {
                const names = Array.from(selectedFiles).map(f => f.name).join(', ');
                document.getElementById('fileStatus').textContent = 
                    `${selectedFiles.length} file(s) selected`;
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        async function uploadPaper() {
            if (!selectedFiles || selectedFiles.length === 0) return;
            const status = document.getElementById('fileStatus');
            const btn = document.getElementById('uploadBtn');

            status.className = 'file-status loading';
            status.textContent = 'Uploading and processing...';
            btn.disabled = true;

            const formData = new FormData();
            Array.from(selectedFiles).forEach(file => {
                formData.append('files', file);
            });

            try {
                const res = await fetch('http://localhost:8000/upload', { method: 'POST', body: formData });
                const data = await res.json();

                status.className = 'file-status success';
                status.textContent = `✓ ${data.files.length} file(s) ready — ${data.total_pages} pages, ${data.total_chunks} chunks`;

                // Show file tags
                const tagsDiv = document.getElementById('fileTags');
                tagsDiv.style.display = 'flex';
                tagsDiv.innerHTML = data.files.map(f => `<span class="file-tag">📄 ${f}</span>`).join('');

                document.getElementById('emptyState').style.display = 'none';
                addAIMessage(`${data.files.length} paper(s) uploaded successfully!\n\n${data.files.map(f => `📄 ${f}`).join('\n')}\n\nTotal: ${data.total_pages} pages processed. Ask me anything about them.`, []);
            } catch (err) {
                status.className = 'file-status';
                status.textContent = 'Upload failed — is the API running?';
                btn.disabled = false;
            }
        }

        function addAIMessage(answer, sources) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message ai';
            const sourceId = 'src_' + Date.now();
            const sourcesHtml = sources && sources.length > 0 ? `
                <div class="sources-toggle" onclick="toggleSources('${sourceId}')">▸ View sources (${sources.length})</div>
                <div class="sources-list" id="${sourceId}">
                    ${sources.map((s, i) => `
                        <div class="source-item">
                            <span class="source-file">📄 ${s.file}</span><br/>
                            ${s.content}
                        </div>`).join('')}
                </div>` : '';
            div.innerHTML = `<div class="message-bubble">${answer}</div>${sourcesHtml}`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addHumanMessage(text) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message human';
            div.innerHTML = `<div class="message-bubble">${text}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addThinking() {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'thinking';
            div.id = 'thinking';
            div.innerHTML = `DocuSense is thinking<span>.</span><span>.</span><span>.</span>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeThinking() {
            const t = document.getElementById('thinking');
            if (t) t.remove();
        }

        function toggleSources(id) {
            document.getElementById(id).classList.toggle('open');
        }

        async function askQuestion() {
            const input = document.getElementById('question');
            const question = input.value.trim();
            if (!question) return;

            addHumanMessage(question);
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;
            addThinking();

            try {
                const res = await fetch(
                    `http://localhost:8000/ask?question=${encodeURIComponent(question)}&session_id=${sessionId}`,
                    { method: 'POST' }
                );
                const data = await res.json();
                removeThinking();
                addAIMessage(data.answer, data.sources);
            } catch (err) {
                removeThinking();
                addAIMessage('Something went wrong. Make sure the API is running.', []);
            }

            document.getElementById('sendBtn').disabled = false;
        }

        async function clearChat() {
            await fetch(`http://localhost:8000/clear/${sessionId}`, { method: 'DELETE' });
            sessionId = 'session_' + Date.now();
            document.getElementById('chatArea').innerHTML = `
                <div class="empty-state" id="emptyState">
                    <h2>Chat cleared</h2>
                    <p>Upload a paper and ask a new question</p>
                </div>`;
            document.getElementById('fileTags').style.display = 'none';
            document.getElementById('fileTags').innerHTML = '';
            document.getElementById('fileStatus').textContent = 'No files selected';
            document.getElementById('fileStatus').className = 'file-status';
            document.getElementById('uploadBtn').disabled = true;
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }
    </script>
</body>
</html>
